name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'codex/**'
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend syntax check
        run: npm run check

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/uni-app-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/uni-app-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build H5 frontend
        run: npm run build:h5

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t safety-inspection-backend ./project/backend

      - name: Build frontend image
        run: docker build -t safety-inspection-frontend ./project/uni-app-frontend
