name: 缺陷修复
description: 记录 bug、回归问题或兼容性问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: 问题现象
      description: 描述具体报错、异常行为或页面表现
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 按顺序写清楚如何复现
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 例如分支、数据库版本、H5/微信端、浏览器、操作系统
    validations:
      required: false
