services:
  mysql:
    image: mysql:8.0
    container_name: safety-inspection-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in root .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_project}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Please set MYSQL_PASSWORD in root .env}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./project/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./project/database/demo_seed.sql:/docker-entrypoint-initdb.d/02-demo-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in root .env}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./project/backend
    container_name: safety-inspection-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./project/backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-app_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Please set MYSQL_PASSWORD in root .env}
      DB_NAME: ${MYSQL_DATABASE:-ai_project}
      PORT: 3000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./project/backend/uploads:/app/uploads

  frontend:
    build:
      context: ./project/uni-app-frontend
    container_name: safety-inspection-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mysql_data:
